<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Willy's Mobile Mechanic</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <style>
    body { background: var(--gray-100); }

    /* ── Login Screen ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
    }
    .login-box {
      background: var(--white);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray-400);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .lock-icon {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 16px;
    }

    /* ── Admin Layout ── */
    .admin-screen { display: none; }
    .admin-header {
      background: var(--black);
      color: var(--white);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--red);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header-logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
    .admin-header-badge {
      background: var(--red);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
      margin-left: 12px;
    }
    .admin-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .admin-body { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .admin-panel {
      background: var(--white);
      border-radius: 8px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .admin-panel-header {
      padding: 16px 24px;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-panel-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.5px;
    }
    .admin-panel-body {
      padding: 24px;
    }

    /* ── Admin Calendar ── */
    .calendar-wrap {
      background: var(--white);
      border-radius: var(--radius);
    }
    .cal-header {
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .cal-header h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.5px;
    }
    .cal-nav {
      background: none; border: none; color: var(--white);
      font-size: 1.2rem; cursor: pointer; padding: 4px 10px;
      border-radius: 4px; transition: background 0.2s;
    }
    .cal-nav:hover { background: rgba(255,255,255,0.15); }
    .cal-grid { padding: 16px; }
    .cal-days-header {
      display: grid; grid-template-columns: repeat(7,1fr);
      text-align: center; margin-bottom: 8px;
    }
    .cal-days-header span {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--gray-400); padding: 4px 0;
    }
    .cal-cells { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-size: 0.85rem; cursor: pointer;
      border: 1.5px solid transparent; font-weight: 500; transition: all 0.15s;
      position: relative;
    }
    .cal-cell.empty { cursor: default; }
    .cal-cell.past { color: var(--gray-200); cursor: not-allowed; }
    .cal-cell.available:hover { background: var(--gray-100); border-color: var(--gray-400); }
    .cal-cell.selected { background: var(--black) !important; color: var(--white) !important; border-color: var(--black) !important; }
    .multi-date-help { font-size: 0.76rem; color: var(--gray-400); margin-top: 8px; line-height: 1.4; }
    .cal-cell.today { border-color: var(--red); }
    .cal-cell.has-slots::after {
      content: ''; position: absolute; bottom: 3px;
      width: 4px; height: 4px; background: var(--green); border-radius: 50%;
    }
    .cal-cell.fully-booked::after {
      background: var(--red);
    }

    /* ── Time Slot Manager ── */
    .slot-manager { margin-top: 16px; }
    .slot-manager-title {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gray-600); margin-bottom: 12px;
    }
    .slot-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .slot-toggle {
      padding: 9px 6px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      cursor: pointer;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      font-weight: 500;
      transition: all 0.15s;
      position: relative;
    }
    .slot-toggle.enabled {
      background: #d4edda;
      border-color: var(--green);
      color: #1a7a3c;
    }
    .slot-toggle.booked {
      background: #fde8e6;
      border-color: var(--red);
      color: var(--red-dark);
      cursor: not-allowed;
    }
    .slot-toggle.booked::after {
      content: '●';
      position: absolute; top: 2px; right: 4px;
      font-size: 6px;
    }
    .save-slots-btn {
      margin-top: 12px;
      width: 100%;
    }

    /* ── Appointments List ── */
    .appt-list { display: flex; flex-direction: column; gap: 12px; }
    .appt-card {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: start;
      transition: box-shadow 0.2s;
    }
    .appt-card:hover { box-shadow: var(--shadow); }
    .appt-date-block {
      background: var(--black);
      color: var(--white);
      border-radius: 6px;
      padding: 8px 12px;
      text-align: center;
      min-width: 56px;
    }
    .appt-date-month { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-400); }
    .appt-date-day { font-family: var(--font-display); font-size: 1.8rem; line-height: 1; }
    .appt-time { font-family: var(--font-mono); font-size: 0.7rem; color: var(--gray-400); margin-top: 2px; }
    .appt-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .appt-vehicle { font-size: 0.82rem; color: var(--gray-600); margin-bottom: 4px; }
    .appt-service { font-size: 0.8rem; font-weight: 600; color: var(--red); }
    .appt-phone { font-size: 0.8rem; color: var(--gray-600); }
    .appt-notes {
      font-size: 0.78rem; color: var(--gray-600);
      font-style: italic; margin-top: 4px;
      border-top: 1px solid var(--gray-200);
      padding-top: 4px;
    }
    .appt-actions { display: flex; flex-direction: column; gap: 6px; }
    .appt-actions button {
      padding: 6px 12px; border-radius: 4px; font-size: 0.75rem;
      font-weight: 600; cursor: pointer; border: 1.5px solid;
      transition: all 0.15s;
    }
    .btn-cancel-appt {
      background: transparent; border-color: var(--gray-200); color: var(--gray-600);
    }
    .btn-cancel-appt:hover { border-color: var(--red); color: var(--red); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 8px 16px; border-radius: var(--radius); font-size: 0.82rem;
      font-weight: 600; cursor: pointer; border: 1.5px solid var(--gray-200);
      background: var(--white); transition: all 0.15s;
    }
    .tab.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 16px;
      text-align: center;
    }
    .stat-num {
      font-family: var(--font-display); font-size: 2.2rem; line-height: 1;
      color: var(--black);
    }
    .stat-label { font-size: 0.72rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .empty-state {
      text-align: center; color: var(--gray-400); padding: 32px;
      font-size: 0.875rem;
    }
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; display: none;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--gray-200);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- ══════ LOGIN SCREEN ══════ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="lock-icon">🔒</div>
      <div class="login-logo">WILLY'S</div>
      <div class="login-sub">Admin Access</div>
      <div id="loginAlert" class="alert"></div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="passwordInput" placeholder="Enter admin password"
          onkeydown="if(event.key==='Enter') attemptLogin()" />
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="attemptLogin()">
        Sign In →
      </button>
    </div>
  </div>

  <!-- ══════ ADMIN SCREEN ══════ -->
  <div class="admin-screen" id="adminScreen">

    <!-- Header -->
    <div class="admin-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <span>🔧</span>
        <span class="admin-header-logo">WILLY'S MOBILE MECHANIC</span>
        <span class="admin-header-badge">Admin</span>
      </div>
      <button class="btn btn-outline" onclick="logout()" style="font-size:0.8rem; padding:6px 14px;">
        Sign Out
      </button>
    </div>

    <!-- Stats -->
    <div style="padding: 24px 32px 0;">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="statToday">–</div>
          <div class="stat-label">Today</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="statWeek">–</div>
          <div class="stat-label">This Week</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="statTotal">–</div>
          <div class="stat-label">Total Upcoming</div>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="admin-body">

      <!-- LEFT: Calendar & Slot Manager -->
      <div>
        <div class="admin-panel">
          <div class="admin-panel-header">
            <span class="admin-panel-title">AVAILABILITY CALENDAR</span>
            <span style="font-size:0.75rem; color:var(--gray-400);">Click dates to set times</span>
          </div>
          <div class="admin-panel-body">
            <div class="calendar-wrap">
              <div class="cal-header">
                <button class="cal-nav" id="adminPrevMonth">‹</button>
                <h3 id="adminCalLabel">Month Year</h3>
                <button class="cal-nav" id="adminNextMonth">›</button>
              </div>
              <div class="cal-grid">
                <div class="cal-days-header">
                  <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
                  <span>Th</span><span>Fr</span><span>Sa</span>
                </div>
                <div class="cal-cells" id="adminCalCells"></div>
              </div>
            </div>

            <!-- Slot Editor -->
            <div class="slot-manager" id="slotManager" style="display:none;">
              <hr class="divider" />
              <div class="slot-manager-title" id="slotManagerTitle">Select time slots</div>
              <div class="slot-grid" id="adminSlotGrid"></div>
              <button class="btn btn-primary save-slots-btn" id="saveSlotsBtn" onclick="saveSlots()">
                Save Availability
              </button>
              <div id="slotSaveAlert" class="alert" style="margin-top:12px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Upcoming Appointments -->
      <div>
        <div class="admin-panel">
          <div class="admin-panel-header">
            <span class="admin-panel-title">UPCOMING APPOINTMENTS</span>
            <button class="btn btn-outline" style="font-size:0.75rem; padding:6px 12px;" onclick="loadAppointments()">
              ↻ Refresh
            </button>
          </div>
          <div class="admin-panel-body">
            <div class="tabs">
              <div class="tab active" onclick="filterAppts('upcoming', this)">Upcoming</div>
              <div class="tab" onclick="filterAppts('today', this)">Today</div>
              <div class="tab" onclick="filterAppts('all', this)">All</div>
            </div>
            <div class="appt-list" id="apptList">
              <div class="empty-state">Loading appointments...</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Init Supabase ──
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Default time slots available to toggle
    const ALL_TIMES = [
      '7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM',
      '12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM'
    ];

    let adminViewYear, adminViewMonth;
    let adminSelectedDates = [];
    let adminAvailableSlots = {};  // { 'YYYY-MM-DD': ['9:00 AM', ...] }
    let adminBookedSlots = {};     // { 'YYYY-MM-DD': ['9:00 AM', ...] }
    let allAppointments = [];
    let currentFilter = 'upcoming';

    // ── LOGIN ──
    async function attemptLogin() {
      const pass = document.getElementById('passwordInput').value;
      const alertEl = document.getElementById('loginAlert');

      if (pass === ADMIN_PASSWORD) {
        sessionStorage.setItem('willy_admin', '1');
        showAdmin();
      } else {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = 'Incorrect password. Try again.';
      }
    }

    function logout() {
      sessionStorage.removeItem('willy_admin');
      document.getElementById('adminScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    function showAdmin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      const now = new Date();
      adminViewYear = now.getFullYear();
      adminViewMonth = now.getMonth();
      initAdminCalendar();
      loadAppointments();
    }

    // Auto-login if session active
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('willy_admin') === '1') showAdmin();
    });

    // ── ADMIN CALENDAR ──
    async function initAdminCalendar() {
      await fetchAdminMonthData(adminViewYear, adminViewMonth);
      renderAdminCalendar();
    }

    async function fetchAdminMonthData(year, month) {
      const firstDay = `${year}-${String(month+1).padStart(2,'0')}-01`;
      const lastDay  = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year,month+1,0).getDate()}`;

      const { data: avail, error: availError } = await sb
        .from('available_slots')
        .select('date, time_slot, is_blocked')
        .gte('date', firstDay).lte('date', lastDay);

      if (availError) console.error('Error loading available_slots:', availError);

      const { data: booked, error: bookedError } = await sb
        .from('appointments')
        .select('date, time_slot')
        .gte('date', firstDay).lte('date', lastDay);

      if (bookedError) console.error('Error loading appointments:', bookedError);

      adminAvailableSlots = {};
      adminBookedSlots = {};

      if (avail) {
        avail.forEach(s => {
          if (!s.is_blocked) {
            if (!adminAvailableSlots[s.date]) adminAvailableSlots[s.date] = [];
            adminAvailableSlots[s.date].push(s.time_slot);
          }
        });
      }
      if (booked) {
        booked.forEach(a => {
          if (!adminBookedSlots[a.date]) adminBookedSlots[a.date] = [];
          adminBookedSlots[a.date].push(a.time_slot);
        });
      }
    }

    function renderAdminCalendar() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      document.getElementById('adminCalLabel').textContent = `${months[adminViewMonth]} ${adminViewYear}`;

      const cells = document.getElementById('adminCalCells');
      cells.innerHTML = '';

      const firstDow = new Date(adminViewYear, adminViewMonth, 1).getDay();
      const daysInMonth = new Date(adminViewYear, adminViewMonth + 1, 0).getDate();
      const today = new Date(); today.setHours(0,0,0,0);

      for (let i = 0; i < firstDow; i++) {
        const el = document.createElement('div');
        el.className = 'cal-cell empty';
        cells.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'cal-cell';
        el.textContent = d;
        const cellDate = new Date(adminViewYear, adminViewMonth, d);
        const dateStr = `${adminViewYear}-${String(adminViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        if (cellDate < today) {
          el.classList.add('past');
        } else {
          el.classList.add('available');
          const slots = adminAvailableSlots[dateStr] || [];
          const booked = adminBookedSlots[dateStr] || [];
          if (slots.length > 0) el.classList.add('has-slots');
          if (slots.length > 0 && booked.length === slots.length) el.classList.add('fully-booked');
          el.addEventListener('click', () => toggleDateSelection(dateStr));
        }

        if (cellDate.toDateString() === today.toDateString()) el.classList.add('today');
        if (adminSelectedDates.includes(dateStr)) el.classList.add('selected');
        cells.appendChild(el);
      }
    }

    function toggleDateSelection(dateStr) {
      if (adminSelectedDates.includes(dateStr)) {
        adminSelectedDates = adminSelectedDates.filter(d => d !== dateStr);
      } else {
        adminSelectedDates.push(dateStr);
        adminSelectedDates.sort();
      }

      renderAdminCalendar();

      if (adminSelectedDates.length === 0) {
        document.getElementById('slotManager').style.display = 'none';
        return;
      }
      openSlotManager();
    }

    function openSlotManager() {
      const selectedCount = adminSelectedDates.length;
      const firstDate = adminSelectedDates[0];
      const [y, m, d] = firstDate.split('-');
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

      document.getElementById('slotManagerTitle').textContent = selectedCount > 1
        ? `Time slots — ${selectedCount} selected dates`
        : `Time slots — ${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;

      const enabledEverywhere = ALL_TIMES.filter(t =>
        adminSelectedDates.every(dateStr => (adminAvailableSlots[dateStr] || []).includes(t))
      );
      const bookedAnywhere = ALL_TIMES.filter(t =>
        adminSelectedDates.some(dateStr => (adminBookedSlots[dateStr] || []).includes(t))
      );

      const grid = document.getElementById('adminSlotGrid');
      grid.innerHTML = '';
      ALL_TIMES.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'slot-toggle';
        btn.textContent = t;
        btn.dataset.time = t;

        if (bookedAnywhere.includes(t)) {
          btn.classList.add('booked');
          btn.title = 'Already booked on at least one selected date — cannot remove in bulk';
        } else if (enabledEverywhere.includes(t)) {
          btn.classList.add('enabled');
        }

        btn.addEventListener('click', () => {
          if (btn.classList.contains('booked')) return;
          btn.classList.toggle('enabled');
        });
        grid.appendChild(btn);
      });

      document.getElementById('slotManager').style.display = 'block';

      let help = document.getElementById('multiDateHelp');
      if (!help) {
        help = document.createElement('div');
        help.id = 'multiDateHelp';
        help.className = 'multi-date-help';
        document.getElementById('slotManagerTitle').after(help);
      }
      help.textContent = selectedCount > 1
        ? 'Bulk edit: selected time slots will be saved to every selected date. Booked times are protected.'
        : 'Click more dates on the calendar to bulk edit availability together.';

      document.getElementById('slotSaveAlert').className = 'alert';
    }

    async function saveSlots() {
      if (adminSelectedDates.length === 0) return;
      document.getElementById('loadingOverlay').style.display = 'flex';

      const enabled = [...document.querySelectorAll('#adminSlotGrid .slot-toggle.enabled')]
        .map(b => b.dataset.time);

      for (const dateStr of adminSelectedDates) {
        const booked = adminBookedSlots[dateStr] || [];

        // Delete all non-booked slots for this date, then re-insert enabled ones.
        const { error: deleteError } = await sb.from('available_slots')
          .delete()
          .eq('date', dateStr)
          .not('time_slot', 'in', `(${booked.map(t => `"${t}"`).join(',') || '"__none__"'})`);

        if (deleteError) {
          console.error('Slot delete failed:', deleteError);
          document.getElementById('loadingOverlay').style.display = 'none';
          const alertEl = document.getElementById('slotSaveAlert');
          alertEl.className = 'alert alert-error show';
          alertEl.textContent = `Save failed for ${dateStr}: ${deleteError.message}`;
          return;
        }

        if (enabled.length > 0) {
          const rows = enabled.map(t => ({ date: dateStr, time_slot: t, is_blocked: false }));
          const { error: upsertError } = await sb.from('available_slots').upsert(rows, { onConflict: 'date,time_slot' });
          if (upsertError) {
            console.error('Slot upsert failed:', upsertError);
            document.getElementById('loadingOverlay').style.display = 'none';
            const alertEl = document.getElementById('slotSaveAlert');
            alertEl.className = 'alert alert-error show';
            alertEl.textContent = `Save failed for ${dateStr}: ${upsertError.message}`;
            return;
          }
        }
      }

      document.getElementById('loadingOverlay').style.display = 'none';

      await fetchAdminMonthData(adminViewYear, adminViewMonth);
      renderAdminCalendar();
      openSlotManager();

      const alertEl = document.getElementById('slotSaveAlert');
      alertEl.className = 'alert alert-success show';
      alertEl.textContent = `✅ Saved ${enabled.length} time slot${enabled.length !== 1 ? 's' : ''} for ${adminSelectedDates.length} date${adminSelectedDates.length !== 1 ? 's' : ''}.`;
      setTimeout(() => alertEl.className = 'alert', 3000);
    }

    // ── APPOINTMENTS ──
    async function loadAppointments() {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await sb
        .from('appointments')
        .select('*')
        .order('date', { ascending: true })
        .order('time_slot', { ascending: true });

      if (error) console.error('Error loading appointment list:', error);
      allAppointments = data || [];
      updateStats();
      renderAppointments(currentFilter);
    }

    function updateStats() {
      const today = new Date().toISOString().split('T')[0];
      const startOfWeek = new Date();
      startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(endOfWeek.getDate() + 6);
      const sowStr = startOfWeek.toISOString().split('T')[0];
      const eowStr = endOfWeek.toISOString().split('T')[0];

      const todayCount  = allAppointments.filter(a => a.date === today).length;
      const weekCount   = allAppointments.filter(a => a.date >= sowStr && a.date <= eowStr).length;
      const totalUpcoming = allAppointments.filter(a => a.date >= today).length;

      document.getElementById('statToday').textContent = todayCount;
      document.getElementById('statWeek').textContent = weekCount;
      document.getElementById('statTotal').textContent = totalUpcoming;
    }

    function filterAppts(filter, tabEl) {
      currentFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabEl.classList.add('active');
      renderAppointments(filter);
    }

    function renderAppointments(filter) {
      const list = document.getElementById('apptList');
      const today = new Date().toISOString().split('T')[0];

      let filtered = allAppointments;
      if (filter === 'today')    filtered = allAppointments.filter(a => a.date === today);
      if (filter === 'upcoming') filtered = allAppointments.filter(a => a.date >= today);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No appointments found.</div>';
        return;
      }

      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      list.innerHTML = filtered.map(appt => {
        const [y, m, d] = appt.date.split('-');
        const notes = appt.notes || '';
        const [address, ...noteLines] = notes.split('\n');
        const extraNotes = noteLines.join('\n').trim();

        return `
          <div class="appt-card">
            <div class="appt-date-block">
              <div class="appt-date-month">${months[parseInt(m)-1]}</div>
              <div class="appt-date-day">${parseInt(d)}</div>
              <div class="appt-time">${appt.time_slot}</div>
            </div>
            <div>
              <div class="appt-name">${appt.customer_name}</div>
              <div class="appt-vehicle">🚗 ${appt.car_year || ''} ${appt.car_make} ${appt.car_model}</div>
              <div class="appt-service">${appt.service}</div>
              <div class="appt-phone">📞 ${appt.phone}${appt.email ? ' · ' + appt.email : ''}</div>
              ${address ? `<div class="appt-notes">📍 ${address}${extraNotes ? '<br>📝 ' + extraNotes : ''}</div>` : ''}
            </div>
            <div class="appt-actions">
              <span class="badge badge-${appt.date >= new Date().toISOString().split('T')[0] ? 'green' : 'gray'}">
                ${appt.status}
              </span>
              <button class="btn-cancel-appt" onclick="cancelAppt('${appt.id}')">Cancel</button>
            </div>
          </div>`;
      }).join('');
    }

    async function cancelAppt(id) {
      if (!confirm('Cancel this appointment?')) return;
      document.getElementById('loadingOverlay').style.display = 'flex';
      await sb.from('appointments').delete().eq('id', id);
      await loadAppointments();
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    // ── Month nav ──
    document.getElementById('adminPrevMonth').addEventListener('click', async () => {
      adminViewMonth--;
      if (adminViewMonth < 0) { adminViewMonth = 11; adminViewYear--; }
      adminSelectedDates = [];
      document.getElementById('slotManager').style.display = 'none';
      await fetchAdminMonthData(adminViewYear, adminViewMonth);
      renderAdminCalendar();
    });
    document.getElementById('adminNextMonth').addEventListener('click', async () => {
      adminViewMonth++;
      if (adminViewMonth > 11) { adminViewMonth = 0; adminViewYear++; }
      adminSelectedDates = [];
      document.getElementById('slotManager').style.display = 'none';
      await fetchAdminMonthData(adminViewYear, adminViewMonth);
      renderAdminCalendar();
    });
  </script>
</body>
</html>
